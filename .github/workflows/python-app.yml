name: CI

on:
  push:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  checks:
    name: Lint and Build Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [ "3.11", "3.12", "3.13", "3.14" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: "latest"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Build
        run: uv build

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1

      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py

      - name: Smoke test (source distribution)
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py


  build-docs:
    name: Build Docs
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Generate documentation
        run: uv run zensical build --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/


  deploy-docs:
    name: Deploy Docs
    needs: build-docs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v5


  create-tag:
    name: Create New Tag
    needs: checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    outputs:
      TAG: ${{ steps.version.outputs.TAG }}
      VERSION: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create initial tag if none exists
        run: |
          if [ -z "$(git tag -l 'v*')" ]; then
            git tag v0.0.0
            git push origin v0.0.0
          fi

      - name: Bump version
        id: bump
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Export version
        id: version
        run: |
          TAG=${{ steps.bump.outputs.new_tag }}
          VERSION=${TAG#v}

          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT


  build-artifacts:
    name: Build Artifacts
    needs: [ checks, create-tag ]
    if: |
      always() &&
      needs.checks.result == 'success' &&
      (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ windows-latest, ubuntu-latest ]

    steps:
      - name: Checkout commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install PyInstaller and local package
        run: uv sync --no-dev --group install

      - name: Build with PyInstaller
        run: uv run pyinstaller spectral_film_lut.spec

      - name: Package binaries
        shell: bash
        run: |
          VERSION=$(uv pip list --format freeze | grep "^zensical=" | cut -d'=' -f3 || echo "dev")

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv dist/SpectralFilmLUT.exe SpectralFilmLUT.exe
          else
            chmod +x dist/SpectralFilmLUT
            mv dist/SpectralFilmLUT SpectralFilmLUT.AppImage
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: spectral-film-lut-${{ matrix.os }}
          path: |
            SpectralFilmLUT.exe
            SpectralFilmLUT.AppImage

  release:
    name: Create Release
    needs: [ create-tag, build-artifacts ]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts/
          merge-multiple: true

      - name: Rename artifacts with version
        run: |
          VERSION="${{ needs.create-tag.outputs.VERSION }}"
          cd release-artifacts/
          if [ -f "SpectralFilmLUT.exe" ]; then
            mv SpectralFilmLUT.exe "SpectralFilmLUT-${VERSION}.exe"
          fi
          if [ -f "SpectralFilmLUT.AppImage" ]; then
            mv SpectralFilmLUT.AppImage "SpectralFilmLUT-${VERSION}.AppImage"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-tag.outputs.TAG }}
          name: Version ${{ needs.create-tag.outputs.VERSION }}
          files: |
            release-artifacts/SpectralFilmLUT-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: create-tag
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment:
      name: pypi

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-tag.outputs.TAG }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: 3.14
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1

      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py

      - name: Smoke test (sdist)
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py

      - name: Publish to PyPI
        run: uv publish
