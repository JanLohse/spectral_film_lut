name: CI, Docs, and Release

on:
  push:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  checks:
    name: Lint and Build Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [ "3.11", "3.12", "3.13", "3.14" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: "latest"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pyinstaller
          pip install .

      - name: Build package
        run: python -m build


  build-docs:
    name: Build Docs
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdoc
          pip install .

      - name: Generate documentation
        env:
          PDOC_ALLOW_EXEC: "1"
        run: |
          pdoc ./src/spectral_film_lut \
            --math \
            --docformat google \
            --logo "https://github.com/JanLohse/spectral_film_lut/blob/main/src/spectral_film_lut/resources/spectral_film_lut_128.png?raw=true" \
            -o docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/


  deploy-docs:
    name: Deploy Docs
    needs: build-docs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4


  tag-and-release:
    name: Tag and Create Release
    needs: checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    outputs:
      TAG: ${{ steps.bump.outputs.new_tag }}
      VERSION: ${{ steps.set_version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create initial tag
        run: |
          if [ -z "$(git tag -l 'v*')" ]; then
            git tag v0.0.0
            git push origin v0.0.0
          fi

      - name: Bump version
        id: bump
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Set version output
        id: set_version
        run: |
          TAG=${{ steps.bump.outputs.new_tag }}
          VERSION=${TAG#v}
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: Version ${{ steps.bump.outputs.new_tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  build:
    name: Build Artifacts
    needs: tag-and-release
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ windows-latest, ubuntu-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag-and-release.outputs.TAG }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller build
          pip install .

      - name: Build with PyInstaller
        run: pyinstaller spectral_film_lut.spec

      - name: Package Windows EXE
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mv dist/SpectralFilmLUT.exe SpectralFilmLUT-${{ needs.tag-and-release.outputs.VERSION }}.exe

      - name: Package Linux binary
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          chmod +x dist/SpectralFilmLUT
          mv dist/SpectralFilmLUT SpectralFilmLUT-${{ needs.tag-and-release.outputs.VERSION }}.AppImage

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag-and-release.outputs.TAG }}
          files: |
            SpectralFilmLUT-${{ needs.tag-and-release.outputs.VERSION }}.exe
            SpectralFilmLUT-${{ needs.tag-and-release.outputs.VERSION }}.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
