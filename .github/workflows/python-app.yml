name: CI

on:
  push:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  checks:
    name: Lint and Build Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [ "3.11", "3.12", "3.13", "3.14" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: "latest"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pyinstaller
          pip install .

      - name: Build package
        run: python -m build


  build-docs:
    name: Build Docs
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdoc
          pip install .

      - name: Generate documentation
        env:
          PDOC_ALLOW_EXEC: "1"
        run: |
          pdoc ./src/spectral_film_lut \
            --math \
            --docformat google \
            --logo "https://github.com/JanLohse/spectral_film_lut/blob/main/src/spectral_film_lut/resources/spectral_film_lut_128.png?raw=true" \
            -o docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/


  deploy-docs:
    name: Deploy Docs
    needs: build-docs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5


  create-tag:
    name: Create New Tag
    needs: checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    outputs:
      TAG: ${{ steps.version.outputs.TAG }}
      VERSION: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create initial tag if none exists
        run: |
          if [ -z "$(git tag -l 'v*')" ]; then
            git tag v0.0.0
            git push origin v0.0.0
          fi

      - name: Bump version
        id: bump
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Export version
        id: version
        run: |
          TAG=${{ steps.bump.outputs.new_tag }}
          VERSION=${TAG#v}

          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT


  build-artifacts:
    name: Build Artifacts
    needs: create-tag
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ windows-latest, ubuntu-latest ]

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-tag.outputs.TAG }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller build
          pip install .

      - name: Build with PyInstaller
        run: pyinstaller spectral_film_lut.spec

      - name: Package binaries
        shell: bash
        run: |
          VERSION=${{ needs.create-tag.outputs.VERSION }}

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv dist/SpectralFilmLUT.exe SpectralFilmLUT-${VERSION}.exe
          else
            chmod +x dist/SpectralFilmLUT
            mv dist/SpectralFilmLUT SpectralFilmLUT-${VERSION}.AppImage
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: spectral-film-lut-${{ matrix.os }}
          path: SpectralFilmLUT-${{ needs.create-tag.outputs.VERSION }}.*


  release:
    name: Create Release
    needs: [ create-tag, build-artifacts ]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: spectral-film-lut-windows-latest
          path: dist/

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: spectral-film-lut-ubuntu-latest
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.TAG }}
          name: Version ${{ needs.create-tag.outputs.VERSION }}
          files: |
            dist/SpectralFilmLUT-${{ needs.create-tag.outputs.VERSION }}.exe
            dist/SpectralFilmLUT-${{ needs.create-tag.outputs.VERSION }}.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
